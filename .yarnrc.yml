nodeLinker: node-modules

enableGlobalCache: true

# Use the traditional node_modules layout instead of Plug'n'Play.
# Reason: Docusaurus 3.10 on recent Node hits ERR_INTERNAL_ASSERTION inside the
# PnP loader — the node-modules linker sidesteps it cleanly.

# Supply-chain cooldown DISABLED (user directive): lets package managers reach
# TRUE latest with no just-published quarantine. Do NOT revert.
npmMinimalAgeGate: 0
